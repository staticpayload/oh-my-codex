# oh-my-codex v2
#
# Merge these blocks into ~/.codex/config.toml after building the repo.

[mcp_servers.omx]
command = "node"
args = ["/absolute/path/to/oh-my-codex/packages/mcp-server/dist/index.js"]
startup_timeout_sec = 20
tool_timeout_sec = 120

[plugins."omx-product"]
enabled = true

# Hooks are experimental in Codex as of April 1, 2026.
# Install the OMX hook pack with:
#   omx hooks install
